<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>FLUXNET authorship nomination</title>
  <style>
    :root {
      --background: #f4f7f6;
      --panel: #ffffff;
      --text: #24313f;
      --muted: #526373;
      --brand: #005a9c;
      --brand-dark: #00487d;
      --border: #d9e2ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--background);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(100%, 560px);
      padding: 32px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(24, 45, 68, 0.12);
      text-align: center;
    }

    .brand {
      margin: 0 0 12px;
      color: var(--brand);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: 1.9rem;
      line-height: 1.2;
      font-weight: 700;
    }

    p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      margin-top: 24px;
      padding: 0 18px;
      border-radius: 6px;
      background: var(--brand);
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }

    a.button:hover,
    a.button:focus {
      background: var(--brand-dark);
    }
  </style>
</head>
<body>
  <main aria-labelledby="page-title">
    <p class="brand">Keenan Group</p>
    <h1 id="page-title">FLUXNET authorship nomination</h1>
    <p>You are being redirected to the FLUXNET authorship nomination form.</p>
    <a class="button" id="continue-link" href="https://script.google.com/macros/s/AKfycbxjfPypQpAZb5mZhlew9TfZGCmMH6-c8tqfL5O1EJQ_MDf5Mm0c9oVNHHPzl9vGbgozyQ/exec">Continue to nomination form</a>
  </main>

  <script>
    (function () {
      // APPS_SCRIPT_BASE must be the deployed Apps Script web app /exec URL, not /dev, an editor URL, Drive, Forms, Sheets, Docs, or googleusercontent URL.
      var APPS_SCRIPT_BASE = "https://script.google.com/macros/s/AKfycbxjfPypQpAZb5mZhlew9TfZGCmMH6-c8tqfL5O1EJQ_MDf5Mm0c9oVNHHPzl9vGbgozyQ/exec";
      var params = new URLSearchParams(window.location.search);
      var siteToken = params.get("site_token");
      var destination = new URL(APPS_SCRIPT_BASE);

      if (siteToken) {
        destination.searchParams.set("site_token", siteToken);
      }

      var destinationUrl = destination.toString();
      document.getElementById("continue-link").setAttribute("href", destinationUrl);

      window.setTimeout(function () {
        window.location.assign(destinationUrl);
      }, 1500);
    }());
  </script>
</body>
</html>
